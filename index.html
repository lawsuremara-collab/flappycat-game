<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🌸 Flappy Cat ~ Pastel Skies 🌸</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #fdeef9 0%, #ffe6f0 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Quicksand', system-ui, -apple-system, 'Comic Neue', cursive;
            padding: 20px;
            margin: 0;
        }

        /* main pastel game container */
        .game-wrapper {
            background-color: #fff9fc;
            border-radius: 72px;
            padding: 20px 24px 24px 24px;
            box-shadow: 0 20px 35px rgba(245, 175, 200, 0.25), 0 8px 12px rgba(0,0,0,0.05);
            backdrop-filter: blur(2px);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 48px;
            box-shadow: 0 12px 28px rgba(255, 182, 193, 0.4);
            cursor: pointer;
            background-color: #ffeef4;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-top: 20px;
            padding: 0 20px;
        }

        .score-box {
            background: #fff0f5;
            border-radius: 100px;
            padding: 8px 20px;
            box-shadow: inset 0 1px 3px #ffd9e6, 0 4px 8px #ffe2ed;
        }

        .score-label {
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 1px;
            color: #e2a1b5;
            margin-right: 10px;
        }

        .score-value {
            font-size: 2rem;
            font-weight: 800;
            color: #f7a1c4;
            text-shadow: 0 2px 4px #ffe0ec;
            font-family: monospace;
        }

        .best-box {
            background: #fff0f5;
            border-radius: 100px;
            padding: 8px 20px;
            box-shadow: inset 0 1px 3px #ffd9e6, 0 4px 8px #ffe2ed;
        }

        .best-label {
            font-size: 1rem;
            font-weight: 600;
            color: #e2a1b5;
            margin-right: 10px;
        }

        .best-value {
            font-size: 2rem;
            font-weight: 800;
            color: #f7a1c4;
            text-shadow: 0 2px 4px #ffe0ec;
        }

        .restart-btn {
            background: #ffe2f0;
            border: none;
            border-radius: 60px;
            padding: 8px 28px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #e78cb0;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: 0.2s ease;
            box-shadow: 0 4px 8px #ffc8dc;
        }

        .restart-btn:hover {
            background: #ffd4e6;
            transform: scale(0.97);
            color: #dd7ea2;
            box-shadow: 0 2px 5px #ffb7cf;
        }

        .restart-btn:active {
            transform: scale(0.95);
        }

        .message {
            text-align: center;
            margin-top: 14px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #efb0c9;
            background: #fff8fa;
            display: inline-block;
            width: auto;
            padding: 6px 18px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
        }

        .controls-tip {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 12px;
            color: #f2bed6;
            font-weight: 500;
            font-size: 0.75rem;
        }

        @media (max-width: 550px) {
            .game-wrapper {
                padding: 12px 16px 18px;
            }
            .score-value, .best-value {
                font-size: 1.5rem;
            }
            .restart-btn {
                padding: 6px 20px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
<div>
    <div class="game-wrapper">
        <canvas id="gameCanvas" width="500" height="600"></canvas>
        
        <div class="info-panel">
            <div class="score-box">
                <span class="score-label">🐱 SCORE</span>
                <span class="score-value" id="currentScore">0</span>
            </div>
            <div class="best-box">
                <span class="best-label">✨ BEST</span>
                <span class="best-value" id="bestScore">0</span>
            </div>
            <button class="restart-btn" id="restartButton">🌸 restart 🌸</button>
        </div>
        <div class="message" id="gameMessage">
            🐾 tap / spacebar / click → fly cutie! 🐾
        </div>
        <div class="controls-tip">
            💖 click canvas or press space ↑ 💖
        </div>
    </div>
</div>

<script>
    (function(){
        // ---------- PASTEL FLAPPY CAT ----------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Dimensions
        const CANVAS_W = 500;
        const CANVAS_H = 600;
        canvas.width = CANVAS_W;
        canvas.height = CANVAS_H;
        
        // Game state
        let gameRunning = true;
        let score = 0;
        let bestScore = localStorage.getItem('flappyCatBest') ? parseInt(localStorage.getItem('flappyCatBest')) : 0;
        document.getElementById('bestScore').innerText = bestScore;
        
        // Cat parameters (cute round cat)
        const CAT_W = 36;
        const CAT_H = 32;
        let cat = {
            x: 70,
            y: CANVAS_H/2 - 20,
            vy: 0,
            gravity: 0.22,
            jumpPower: -5.2,
            rotation: 0
        };
        
        // Pipe settings - PASTEL style
        const PIPE_W = 58;
        const PIPE_GAP = 130;
        const PIPE_SPACING = 210;
        let pipes = [];
        
        // Frame control & physics
        let frame = 0;
        let lastTimestamp = 0;
        let animationId = null;
        
        // Particle system for cute sparkles and stars
        let particles = [];
        
        // Generate first pipe
        function initGame() {
            gameRunning = true;
            score = 0;
            document.getElementById('currentScore').innerText = "0";
            document.getElementById('gameMessage').innerHTML = "🐱✨ tap to fly! ✨🐱";
            cat.y = CANVAS_H/2 - 20;
            cat.vy = 0;
            cat.rotation = 0;
            pipes = [];
            // create first 3 pipes
            for(let i = 0; i < 3; i++) {
                let pipeX = CANVAS_W + i * PIPE_SPACING;
                let gapY = getRandomGapY();
                pipes.push({
                    x: pipeX,
                    gapY: gapY,
                    counted: false
                });
            }
            particles = [];
            // little happy stars at start
            for(let i=0;i<8;i++) {
                addParticle(CANVAS_W/2, CANVAS_H/2, true);
            }
        }
        
        function getRandomGapY() {
            const minGap = 90;
            const maxGap = CANVAS_H - PIPE_GAP - 90;
            return Math.floor(Math.random() * (maxGap - minGap + 1) + minGap);
        }
        
        // cute floating particles
        function addParticle(x, y, isStartBurst=false) {
            particles.push({
                x: x,
                y: y,
                vx: (Math.random() - 0.5) * 1.2,
                vy: (Math.random() - 0.8) * -1.5 - 1,
                life: 1.0,
                size: Math.random() * 4 + 2,
                color: `hsl(${Math.random() * 40 + 320}, 80%, 75%)` // pastel pink/purple/peach
            });
            if(isStartBurst){
                for(let i=0;i<5;i++) addParticle(x+ (Math.random()-0.5)*20, y+(Math.random()-0.5)*20);
            }
        }
        
        function updateParticles() {
            for(let i=0; i<particles.length; i++) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.1;
                p.life -= 0.02;
                if(p.x > CANVAS_W+30 || p.x < -30 || p.y > CANVAS_H+50 || p.y < -30 || p.life <= 0) {
                    particles.splice(i,1);
                    i--;
                }
            }
        }
        
        function drawParticles() {
            for(let p of particles) {
                ctx.save();
                ctx.globalAlpha = p.life * 0.7;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * 0.8, 0, Math.PI*2);
                ctx.fillStyle = p.color;
                ctx.fill();
                ctx.beginPath();
                ctx.arc(p.x-1, p.y-1, p.size*0.3, 0, Math.PI*2);
                ctx.fillStyle = "#fff9e6";
                ctx.fill();
                ctx.restore();
            }
        }
        
        // add score particle effect
        function addScoreSparkle(pipeX, gapCenterY) {
            for(let i=0;i<12;i++) {
                particles.push({
                    x: pipeX + PIPE_W/2,
                    y: gapCenterY,
                    vx: (Math.random() - 0.5) * 2.5,
                    vy: (Math.random() - 1) * -2,
                    life: 0.9,
                    size: Math.random() * 4 + 1.5,
                    color: `hsl(${Math.random() * 30 + 40}, 85%, 70%)` // pastel yellow/peach
                });
            }
        }
        
        // Update logic
        function updateGame() {
            if(!gameRunning) return;
            
            // 1. cat physics
            cat.vy += cat.gravity;
            cat.y += cat.vy;
            // rotation based on velocity (cute tilt)
            cat.rotation = Math.min(Math.max(cat.vy * 0.12, -0.5), 0.7);
            
            // boundaries (top and bottom collision)
            if(cat.y + CAT_H/2 >= CANVAS_H - 12 || cat.y - CAT_H/2 <= 8) {
                gameOver();
                return;
            }
            
            // 2. pipe movement & collisions
            for(let i=0; i<pipes.length; i++) {
                let p = pipes[i];
                p.x -= 2.3;  // smooth scrolling speed
                
                // collision detection (rect approx)
                const catLeft = cat.x - CAT_W/2;
                const catRight = cat.x + CAT_W/2;
                const catTop = cat.y - CAT_H/2;
                const catBottom = cat.y + CAT_H/2;
                
                const topPipeRect = { x: p.x, y: 0, w: PIPE_W, h: p.gapY };
                const bottomPipeRect = { x: p.x, y: p.gapY + PIPE_GAP, w: PIPE_W, h: CANVAS_H - (p.gapY + PIPE_GAP) };
                
                if( (catRight > topPipeRect.x && catLeft < topPipeRect.x + PIPE_W &&
                     catTop < topPipeRect.h) ||
                    (catRight > bottomPipeRect.x && catLeft < bottomPipeRect.x + PIPE_W &&
                     catBottom > bottomPipeRect.y) ) {
                    gameOver();
                    return;
                }
                
                // scoring
                if(!p.counted && p.x + PIPE_W < cat.x - CAT_W/2) {
                    p.counted = true;
                    score++;
                    document.getElementById('currentScore').innerText = score;
                    // cute sparkle at pipe gap
                    let centerGap = p.gapY + PIPE_GAP/2;
                    addScoreSparkle(p.x, centerGap);
                    // also happy meow particle near cat
                    for(let s=0; s<6; s++) addParticle(cat.x + (Math.random()-0.5)*20, cat.y-8);
                    // play imaginary *meow* vibe
                }
            }
            
            // remove offscreen pipes and add new ones
            if(pipes.length > 0 && pipes[0].x + PIPE_W < 0) {
                pipes.shift();
                let newGap = getRandomGapY();
                let lastPipe = pipes[pipes.length-1];
                let newX = lastPipe.x + PIPE_SPACING;
                pipes.push({
                    x: newX,
                    gapY: newGap,
                    counted: false
                });
            }
            
            // optional: add idle floating particles for atmosphere
            if(Math.random() < 0.1) {
                addParticle(Math.random() * CANVAS_W, CANVAS_H - 15 + Math.random() * 20);
            }
            
            updateParticles();
        }
        
        function gameOver() {
            if(!gameRunning) return;
            gameRunning = false;
            // update best score
            if(score > bestScore) {
                bestScore = score;
                localStorage.setItem('flappyCatBest', bestScore);
                document.getElementById('bestScore').innerText = bestScore;
                document.getElementById('gameMessage').innerHTML = "🎀 NEW BEST! purrfect! 🎀  click restart";
            } else {
                document.getElementById('gameMessage').innerHTML = "😿 oopsie... tap restart to fly again 😿";
            }
            // burst of sad? but cute cloud particles
            for(let i=0;i<20;i++) {
                particles.push({
                    x: cat.x,
                    y: cat.y,
                    vx: (Math.random()-0.5)*2.8,
                    vy: (Math.random()-0.8)* -1.8,
                    life: 0.8,
                    size: Math.random() * 5 + 1,
                    color: `hsl(${Math.random() * 40 + 300}, 85%, 80%)`
                });
            }
        }
        
        function jump() {
            if(!gameRunning) return;
            cat.vy = cat.jumpPower;
            // add cute wing sparkles ✨
            for(let i=0;i<10;i++) {
                addParticle(cat.x - 12, cat.y + (Math.random()-0.5)*12);
            }
            // also little heart shaped? just extra fluff
            for(let i=0;i<3;i++) {
                particles.push({
                    x: cat.x - 8,
                    y: cat.y,
                    vx: -1 + Math.random()*1.5,
                    vy: -1.5,
                    life: 0.9,
                    size: 3,
                    color: "#ffb7d2"
                });
            }
        }
        
        // ---------- DRAW EVERYTHING : PASTEL PARADISE ----------
        function drawBackground() {
            // gradient sky (pastel sunrise)
            let grad = ctx.createLinearGradient(0, 0, 0, CANVAS_H);
            grad.addColorStop(0, "#ffe8f0");
            grad.addColorStop(0.6, "#ffdfeb");
            grad.addColorStop(1, "#ffd5e4");
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
            // fluffy clouds
            ctx.fillStyle = "#ffffffcc";
            ctx.shadowBlur = 0;
            for(let i=0;i<5;i++) {
                let cloudX = (frame*0.2 + i*120) % (CANVAS_W+200) - 100;
                let cloudY = 40 + i*25;
                ctx.beginPath();
                ctx.ellipse(cloudX, cloudY, 45, 35, 0, 0, Math.PI*2);
                ctx.ellipse(cloudX+30, cloudY-10, 38, 32, 0, 0, Math.PI*2);
                ctx.ellipse(cloudX-25, cloudY-5, 40, 30, 0, 0, Math.PI*2);
                ctx.fillStyle = "rgba(255,245,250,0.85)";
                ctx.fill();
            }
            // tiny floating stars (pastel dots)
            for(let i=0;i<60;i++) {
                ctx.fillStyle = `rgba(255, 220, 200, ${0.2+Math.sin(Date.now()*0.002+i)*0.1})`;
                ctx.beginPath();
                ctx.arc( (i*131)%CANVAS_W, (i*57+frame)%CANVAS_H, 1.5, 0, Math.PI*2);
                ctx.fill();
            }
        }
        
        function drawPipes() {
            for(let pipe of pipes) {
                // pastel mint green / lavender pipes
                const gradTop = ctx.createLinearGradient(pipe.x, 0, pipe.x+PIPE_W, 0);
                gradTop.addColorStop(0, "#c7e9d0");
                gradTop.addColorStop(1, "#b8dfc3");
                ctx.fillStyle = gradTop;
                ctx.shadowColor = "#cfa5bc30";
                ctx.shadowBlur = 6;
                ctx.fillRect(pipe.x, 0, PIPE_W, pipe.gapY);
                // bottom pipe
                const gradBottom = ctx.createLinearGradient(pipe.x, pipe.gapY+PIPE_GAP, pipe.x+PIPE_W, CANVAS_H);
                gradBottom.addColorStop(0, "#ebc8df");
                gradBottom.addColorStop(1, "#e2bdd4");
                ctx.fillStyle = gradBottom;
                ctx.fillRect(pipe.x, pipe.gapY+PIPE_GAP, PIPE_W, CANVAS_H - (pipe.gapY+PIPE_GAP));
                // cute pipe rims (pastel)
                ctx.fillStyle = "#ffe1f0";
                ctx.fillRect(pipe.x-4, pipe.gapY-16, PIPE_W+8, 20);
                ctx.fillRect(pipe.x-4, pipe.gapY+PIPE_GAP-6, PIPE_W+8, 20);
                ctx.fillStyle = "#f7bfd6";
                ctx.fillRect(pipe.x-2, pipe.gapY-12, PIPE_W+4, 12);
                ctx.fillRect(pipe.x-2, pipe.gapY+PIPE_GAP-2, PIPE_W+4, 12);
                // little flower decoration on pipes
                ctx.fillStyle = "#ffb7cf";
                ctx.beginPath();
                ctx.arc(pipe.x+PIPE_W/2, pipe.gapY-8, 6, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = "#fde2a2";
                ctx.beginPath();
                ctx.arc(pipe.x+PIPE_W/2, pipe.gapY-8, 3, 0, Math.PI*2);
                ctx.fill();
            }
            ctx.shadowBlur = 0;
        }
        
        function drawCat() {
            ctx.save();
            ctx.translate(cat.x, cat.y);
            ctx.rotate(cat.rotation);
            // cute round cat body
            ctx.shadowBlur = 8;
            ctx.shadowColor = "#eec0d4";
            ctx.fillStyle = "#FCC5D9";
            ctx.beginPath();
            ctx.ellipse(0, 0, CAT_W/2, CAT_H/2, 0, 0, Math.PI*2);
            ctx.fill();
            // belly lighter
            ctx.fillStyle = "#FFE2F0";
            ctx.beginPath();
            ctx.ellipse(-2, 4, CAT_W/3.5, CAT_H/3.2, 0, 0, Math.PI*2);
            ctx.fill();
            // ears (triangles)
            ctx.fillStyle = "#EAAEC2";
            ctx.beginPath();
            ctx.moveTo(-18, -16);
            ctx.lineTo(-8, -28);
            ctx.lineTo(2, -16);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(18, -16);
            ctx.lineTo(8, -28);
            ctx.lineTo(-2, -16);
            ctx.fill();
            // inner ears pink
            ctx.fillStyle = "#FFB7CE";
            ctx.beginPath();
            ctx.moveTo(-14, -18);
            ctx.lineTo(-8, -26);
            ctx.lineTo(-2, -18);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(14, -18);
            ctx.lineTo(8, -26);
            ctx.lineTo(2, -18);
            ctx.fill();
            // eyes big & shiny
            ctx.fillStyle = "#FFFFFF";
            ctx.beginPath();
            ctx.arc(-10, -2, 6, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(10, -2, 6, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "#503335";
            ctx.beginPath();
            ctx.arc(-9, -1, 2.5, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(11, -1, 2.5, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "white";
            ctx.beginPath();
            ctx.arc(-11, -3, 1.2, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(9, -3, 1.2, 0, Math.PI*2);
            ctx.fill();
            // blush
            ctx.fillStyle = "#FFAFC7";
            ctx.globalAlpha = 0.5;
            ctx.beginPath();
            ctx.ellipse(-16, 5, 4, 3, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(16, 5, 4, 3, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.globalAlpha = 1;
            // little whiskers
            ctx.beginPath();
            ctx.moveTo(-22, 2);
            ctx.lineTo(-32, 0);
            ctx.moveTo(-22, 5);
            ctx.lineTo(-33, 6);
            ctx.moveTo(22, 2);
            ctx.lineTo(32, 0);
            ctx.moveTo(22, 5);
            ctx.lineTo(33, 6);
            ctx.lineWidth = 1.5;
            ctx.strokeStyle = "#cc8aa8";
            ctx.stroke();
            // nose tiny pink
            ctx.fillStyle = "#F28CB1";
            ctx.beginPath();
            ctx.arc(0, 6, 2.8, 0, Math.PI*2);
            ctx.fill();
            ctx.restore();
            
            // extra: little floating hearts near cat (dynamic)
            if(gameRunning && Math.random()<0.05){
                particles.push({
                    x: cat.x - 12 + Math.random()*24,
                    y: cat.y - 10,
                    vx: (Math.random()-0.5)*0.6,
                    vy: -0.9,
                    life: 0.7,
                    size: 2.5,
                    color: "#ffaacb"
                });
            }
        }
        
        function drawUItext() {
            if(!gameRunning) {
                ctx.font = "bold 28px 'Segoe UI', 'Quicksand'";
                ctx.fillStyle = "#ffbfd8";
                ctx.shadowBlur = 0;
                ctx.fillText("💔", CANVAS_W/2-35, CANVAS_H/2-50);
                ctx.font = "18px 'Quicksand'";
                ctx.fillStyle = "#eaa9c2";
                ctx.fillText("click restart to cuddle", CANVAS_W/2-110, CANVAS_H/2+30);
            }
            // score on canvas too
            ctx.font = "bold 34px 'Quicksand'";
            ctx.fillStyle = "#ffc1db";
            ctx.shadowBlur = 3;
            ctx.fillText("🐾", 20, 70);
        }
        
        // Animation loop
        let lastFrameTime = 0;
        function animate(timestamp) {
            if(!animationId) return;
            updateGame();
            drawBackground();
            drawPipes();
            drawCat();
            drawParticles();
            drawUItext();
            frame++;
            animationId = requestAnimationFrame(animate);
        }
        
        // restart logic
        function restartGame() {
            initGame();
            gameRunning = true;
            document.getElementById('currentScore').innerText = "0";
            if(score>bestScore){
                bestScore = score;
                localStorage.setItem('flappyCatBest', bestScore);
                document.getElementById('bestScore').innerText = bestScore;
            }
            document.getElementById('gameMessage').innerHTML = "🐱✨ fly again! tap space ✨🐱";
            // fresh particles
            for(let i=0;i<15;i++) addParticle(cat.x, cat.y, true);
        }
        
        // Event binding
        function handleJump(e) {
            if(e.type === 'keydown') {
                if(e.code === 'Space' || e.code === 'ArrowUp') {
                    e.preventDefault();
                    if(!gameRunning) return;
                    jump();
                }
                if(e.code === 'Space' && !gameRunning) {
                    // optional restart on spacebar? but we have restart button, just convenience
                }
            } else {
                // click / tap
                if(!gameRunning) return;
                jump();
            }
        }
        
        function handleInput(e) {
    e.preventDefault();
    if(!gameRunning) return;
    jump();
}

// mouse click
canvas.addEventListener('click', handleInput);

// mobile touch (VERY IMPORTANT)
canvas.addEventListener('touchstart', handleInput);
        window.addEventListener('keydown', handleJump);
        document.getElementById('restartButton').addEventListener('click', () => {
            restartGame();
        });
        
        // init and start
        initGame();
        animationId = requestAnimationFrame(animate);
    })();
</script>
</body>
</html>
